<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ถุงพลัส</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        input[type="number"] { font-size: 1.5rem; }
        .base-input { font-size: 1.2rem; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-32">

    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 pt-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800">คำนวณงาน</h1>
                <button onclick="addJob()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-lg shadow-md active:scale-95 transition-all">
                    + เพิ่มงาน
                </button>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-blue-100">
                <label class="block text-gray-500 text-sm mb-1">ตั้งค่าตัวลบพาเลท (ปัจจุบัน)</label>
                <div class="flex items-center gap-3">
                    <input type="number" id="baseValue" oninput="updateAllCalculations()" 
                        class="base-input w-full bg-blue-50 border-2 border-blue-200 rounded-xl p-2 text-center text-blue-700 font-bold focus:border-blue-500 outline-none" 
                        value="90">
                    <span class="text-gray-400">ถุง</span>
                </div>
                <p class="text-xs text-gray-400 mt-2">* เปลี่ยนเลขนี้เพื่อเปลี่ยนค่าคำนวณ (B - X)</p>
            </div>
        </header>

        <div id="jobList" class="space-y-6">
            </div>
    </div>

    <div class="fixed bottom-6 right-6">
        <button onclick="addJob()" class="bg-blue-600 text-white w-16 h-16 rounded-full shadow-xl flex items-center justify-center text-3xl active:scale-90 transition-all">
            +
        </button>
    </div>

    <script>
        let jobCount = 0;

        function addJob() {
            jobCount++;
            const jobList = document.getElementById('jobList');
            const card = document.createElement('div');
            card.id = `job-card-${jobCount}`;
            card.className = "job-card bg-white rounded-2xl shadow-sm border border-gray-200 p-5 relative animate-in fade-in zoom-in duration-300";
            
            card.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg text-sm font-medium">งานที่ ${jobCount}</span>
                    <button onclick="removeJob(${jobCount})" class="text-red-400 p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-500 text-sm mb-1 text-center">ค่า A</label>
                        <input type="number" oninput="calculateCard(this.closest('.job-card'))" 
                            class="valA w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 text-center focus:border-blue-400 outline-none transition-all" 
                            placeholder="0">
                    </div>
                    <div>
                        <label class="block text-gray-500 text-sm mb-1 text-center">ค่า B</label>
                        <input type="number" oninput="calculateCard(this.closest('.job-card'))" 
                            class="valB w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 text-center focus:border-blue-400 outline-none transition-all" 
                            placeholder="0">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 border-t pt-4">
                    <div class="text-center">
                        <p class="text-xs text-gray-400 uppercase">คำตอบถุง (B-A)</p>
                        <p class="ans1 text-3xl font-bold text-blue-600 leading-tight">0</p>
                    </div>
                    <div class="text-center border-l border-gray-100">
                        <p class="text-xs text-gray-400 uppercase">คำตอบพาเลท (B-<span class="base-label">90</span>)</p>
                        <p class="ans2 text-3xl font-bold text-indigo-600 leading-tight">0</p>
                    </div>
                </div>
            `;
            jobList.prepend(card);
            updateAllCalculations(); // เพื่อให้อัปเดตตัวเลข Label ทันทีที่เพิ่มงาน
        }

        function removeJob(id) {
            if(confirm('ลบรายการนี้?')) {
                document.getElementById(`job-card-${id}`).remove();
            }
        }

        // ฟังก์ชันคำนวณแยกแต่ละใบ
        function calculateCard(card) {
            const a = parseFloat(card.querySelector('.valA').value) || 0;
            const b = parseFloat(card.querySelector('.valB').value) || 0;
            const base = parseFloat(document.getElementById('baseValue').value) || 0;

            const res1 = b - a;
            const res2 = b - base;

            card.querySelector('.ans1').innerText = res1.toLocaleString();
            card.querySelector('.ans2').innerText = res2.toLocaleString();
            card.querySelector('.base-label').innerText = base;
        }

        // ฟังก์ชันอัปเดตทุกใบเมื่อมีการเปลี่ยนค่า Base (90)
        function updateAllCalculations() {
            const cards = document.querySelectorAll('.job-card');
            cards.forEach(card => {
                calculateCard(card);
            });
        }

        // เริ่มต้นงานแรก
        addJob();
    </script>
</body>
</html>

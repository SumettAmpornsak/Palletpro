<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ถุงพลัส · PalletPro Edition</title>
    <meta name="description" content="ถุงพลัส PalletPro เว็บแอพคำนวณถุงและพาเลท พร้อมระบบบันทึกประวัติการทำงานบน Firebase" />
    <meta name="author" content="Sumett Ampornsak" />
    <link rel="icon" href="https://i.supaimg.com/0bb45aa1-578e-4a4f-9427-4b59f2356d46/1e55ca50-cea4-4705-9984-c691c7b874c4.png" type="image/x-icon" />
    <!-- PWA Meta -->
    <meta name="theme-color" content="#4c8b3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ถุงพลัส">
    <link rel="apple-touch-icon" href="https://i.supaimg.com/0bb45aa1-578e-4a4f-9427-4b59f2356d46/1e55ca50-cea4-4705-9984-c691c7b874c4.png">
    <!-- Bootstrap 5 + Icons + AOS + Google Fonts + SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        * { font-family: 'Kanit', sans-serif; }
        body {
            background: linear-gradient(145deg, #eef7e8 0%, #e2f0da 100%);
            min-height: 100vh;
            padding-bottom: 5rem;
            margin: 0;
        }
        .job-card {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid rgba(80, 140, 70, 0.2);
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
        }
        .job-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 28px -12px rgba(70, 120, 50, 0.2);
            border-color: #a0d18c;
        }
        .bg-soft-mint { background-color: #eef5e9; }
        .text-green-soft { color: #2f6b2f; }
        .btn-soft-green {
            background-color: #4c8b3c;
            border: none;
            color: white;
            transition: all 0.2s;
        }
        .btn-soft-green:hover {
            background-color: #3b6e2e;
            transform: scale(0.97);
            box-shadow: 0 5px 12px rgba(60, 110, 40, 0.2);
        }
        .btn-outline-green-soft {
            border: 1.5px solid #7fae6b;
            color: #2d5a2a;
            background: white;
        }
        .btn-outline-green-soft:hover {
            background-color: #e1f3da;
            border-color: #568c42;
        }
        .base-input-card {
            background-color: #f8fff4;
            border: 1.5px solid #cde2c2;
            border-radius: 24px;
        }
        .result-badge {
            background: #f2faeef0;
            border-radius: 32px;
            padding: 0.5rem 0.75rem;
        }
        .floating-add {
            width: 64px;
            height: 64px;
            font-size: 2rem;
            border-radius: 64px;
            background-color: #4c8b3c;
            color: white;
            border: none;
            box-shadow: 0 8px 18px rgba(70, 110, 40, 0.35);
            transition: 0.15s linear;
        }
        .floating-add:hover {
            background-color: #326b24;
            transform: scale(0.96);
        }
        input.form-control-lg-custom {
            font-size: 1.35rem;
            font-weight: 500;
            text-align: center;
            border-radius: 20px;
            border: 1.5px solid #cfe2c5;
        }
        input.form-control-lg-custom:focus {
            border-color: #6c9e58;
            box-shadow: 0 0 0 3px rgba(108, 158, 88, 0.2);
        }
        .job-number {
            background-color: #eaf5e4;
            border-radius: 60px;
            padding: 0.2rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #3c6e2c;
        }
        .delete-icon {
            cursor: pointer;
            transition: 0.1s;
            color: #b0c49e;
        }
        .delete-icon:hover {
            color: #cf5a5a;
            transform: scale(1.05);
        }
        .answer-number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            color: #3a7744;
        }
        .ans-label {
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            font-weight: 500;
            color: #6f8f63;
        }
        .badge-base {
            background: #dbefd2;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        /* Log section */
        .log-card {
            background: #fefef7;
            border-radius: 28px;
            border: 1px solid #cde0c0;
        }
        .log-container {
            max-height: 260px;
            overflow-y: auto;
            background: #fffff5;
            border-radius: 20px;
            padding: 0.25rem;
        }
        .log-item {
            font-size: 0.8rem;
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid #e2edda;
        }
        .log-time {
            font-weight: 600;
            color: #568c42;
            background: #eef5ea;
            border-radius: 40px;
            padding: 0.1rem 0.6rem;
            display: inline-block;
            font-size: 0.7rem;
        }
        .btn-clear-log {
            background: transparent;
            border: 1px solid #cbdcc0;
            color: #5a7c4a;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
        }
        .btn-clear-log:hover {
            background: #e9f3e3;
        }
        .footer-enhanced {
            background: rgba(255, 255, 240, 0.92);
            backdrop-filter: blur(4px);
            border-top: 2px solid #d4e8ca;
            border-radius: 28px 28px 0 0;
        }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #eef7e8 0%, #e2f0da 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        .splash-screen.hide { opacity: 0; visibility: hidden; }
        .splash-logo { width: 120px; margin-bottom: 20px; animation: pulse 1.2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
        #progressBar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background-color: #dcc42a;
            z-index: 9998;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="progressBar"></div>
    <div id="splashScreen" class="splash-screen">
        <img src="https://i.supaimg.com/0bb45aa1-578e-4a4f-9427-4b59f2356d46/1e55ca50-cea4-4705-9984-c691c7b874c4.png" alt="logo" class="splash-logo">
        <div class="splash-title">ถุงพลัส</div>
        <div class="splash-sub">เชื่อมต่อ Firebase & โหลดข้อมูล...</div>
        <div class="spinner-wave mt-3"><span></span><span></span><span></span></div>
    </div>

    <div class="container px-3 px-md-4" style="max-width: 640px;">
        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <div>
                <h1 class="display-6 fw-semibold" style="color:#2c5e2a;"><i class="bi bi-bag-check-fill me-2"></i> ถุงพลัส</h1>
                <p class="text-muted small">PalletPro · บันทึกงานบน Firebase (CRUD)</p>
            </div>
            <button onclick="addNewJob()" class="btn btn-soft-green rounded-pill px-4 py-2 shadow-sm"><i class="bi bi-plus-circle me-1"></i> เพิ่มงาน</button>
        </div>

        <!-- ค่าตัวลบพาเลท (X) -->
        <div class="mb-4">
            <div class="base-input-card p-3 p-md-4 bg-white shadow-sm">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <i class="bi bi-sliders2 fs-5 text-success-emphasis"></i>
                        <label class="fw-semibold mb-0">ค่าตัวลบพาเลท (X)</label>
                        <span class="badge-base"><i class="bi bi-calculator-fill me-1"></i> ค่าเริ่มต้น 90</span>
                    </div>
                    <div class="d-flex align-items-center gap-2 bg-soft-mint px-3 py-1 rounded-4">
                        <input type="number" id="baseValue" class="form-control form-control-sm text-center fw-bold border-0 bg-transparent" style="width: 95px; font-size: 1.4rem;" value="90" step="1">
                        <span class="fw-semibold">พาเลท</span>
                    </div>
                </div>
                <div class="small text-secondary mt-2"><i class="bi bi-info-circle-fill me-1"></i> ผลลัพธ์ = B - X (สามารถปรับ X ได้ทันที)</div>
            </div>
        </div>

        <!-- รายการงาน (jobs) -->
        <div id="jobList" class="d-flex flex-column gap-3"></div>

        <!-- บันทึกประวัติ Logs (Firebase) -->
        <div class="mt-4">
            <div class="log-card p-3 p-md-4 shadow-sm">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                    <div class="d-flex gap-2 align-items-center">
                        <i class="bi bi-clock-history fs-5 text-success"></i>
                        <h5 class="fw-semibold mb-0">Logs บันทึกการทำงาน</h5>
                        <span id="logCountBadge" class="badge bg-secondary-subtle text-dark rounded-pill">0</span>
                    </div>
                    <button id="clearLogsBtn" class="btn-clear-log"><i class="bi bi-trash3 me-1"></i> ล้าง logs ทั้งหมด</button>
                </div>
                <div id="logContainer" class="log-container">
                    <div class="text-center text-muted small py-3">กำลังโหลด logs...</div>
                </div>
            </div>
        </div>

        <footer class="footer-enhanced mt-4 pt-3 pb-2 px-3 text-center small text-secondary">
            © <span id="currentYear"></span> <a href="https://sumettampornsak.vercel.app" target="_blank" class="text-green-soft">Sumett Ampornsak</a> · เวอร์ชัน Firebase CRUD 6.0.1
        </footer>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3 z-3">
        <button onclick="addNewJob()" class="floating-add d-flex align-items-center justify-content-center shadow-lg border-0"><i class="bi bi-plus-lg fw-bold"></i></button>
    </div>

    <script>
        // ======================== FIREBASE CONFIGURATION ========================
        // 🔧 กรุณาแทนที่ค่าด้วย config ของคุณจาก Firebase Console
        const firebaseConfig = {
  apiKey: "AIzaSyC4ASnt4d4bqKY2IQPa4xQQeBrVQFevT9M",
  authDomain: "palletpro-db.firebaseapp.com",
databaseURL :"https://palletpro-db-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "palletpro-db",
  storageBucket: "palletpro-db.firebasestorage.app",
  messagingSenderId: "750210916860",
  appId: "1:750210916860:web:6f425f8b206eaf39dc5279"
};
        
        // เริ่มต้น Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const jobsRef = database.ref("jobs");
        const logsRef = database.ref("logs");

        // Global state
        let currentJobs = [];      // เก็บ jobs array ปัจจุบันสำหรับใช้ render
        let currentLogs = [];

        // Helper: แสดง SweetAlert แจ้งเตือน
        function showToast(icon, title, timer = 1500) {
            Swal.fire({ icon, title, toast: true, timer, showConfirmButton: false, position: 'top-end' });
        }

        // บันทึก Log ลง Firebase
        async function addSystemLog(message, relatedJobId = null) {
            const newLogRef = logsRef.push();
            const logEntry = {
                timestamp: new Date().toISOString(),
                message: message,
                jobId: relatedJobId,
                readableTime: new Date().toLocaleString('th-TH', { hour12: false })
            };
            await newLogRef.set(logEntry);
        }

        // เรนเดอร์ jobs ทั้งหมด (data จาก Firebase)
        function renderJobs() {
            const container = document.getElementById('jobList');
            if (!container) return;
            if (!currentJobs.length) {
                container.innerHTML = `<div class="text-center p-5 text-muted bg-white rounded-4 shadow-sm"><i class="bi bi-inbox fs-1"></i><p class="mt-2">ยังไม่มีงาน กดปุ่ม + เพื่อเพิ่มงาน</p></div>`;
                return;
            }
            const baseX = parseFloat(document.getElementById('baseValue').value) || 90;
            let html = '';
            currentJobs.forEach((job, idx) => {
                const a = job.a ?? 0;
                const b = job.b ?? 0;
                const result = (b - baseX).toFixed(2);
                html += `
                    <div class="job-card p-3 p-md-4" data-job-id="${job.id}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="job-number"><i class="bi bi-briefcase-fill me-1"></i> งานที่ ${idx+1}</div>
                            <i class="bi bi-trash3 delete-icon fs-5" onclick="deleteJobById('${job.id}')"></i>
                        </div>
                        <div class="row g-3 align-items-end">
                            <div class="col-6">
                                <label class="form-label small fw-semibold text-secondary">ค่าถุง (A)</label>
                                <input type="number" id="a_${job.id}" class="form-control form-control-lg-custom" value="${a}" step="any" placeholder="A">
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-semibold text-secondary">ค่าพาเลท (B)</label>
                                <input type="number" id="b_${job.id}" class="form-control form-control-lg-custom" value="${b}" step="any" placeholder="B">
                            </div>
                            <div class="col-12 mt-2">
                                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                                    <div class="result-badge flex-grow-1 text-center">
                                        <div class="ans-label">ผลลัพธ์สุทธิ (B - X)</div>
                                        <div class="answer-number" id="result_${job.id}">${result}</div>
                                        <small class="text-muted">X = ${baseX}</small>
                                    </div>
                                    <button class="btn btn-soft-green rounded-pill px-4" onclick="calculateAndUpdate('${job.id}')">
                                        <i class="bi bi-calculator-fill me-1"></i> คำนวณ & บันทึก
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // คำนวณสำหรับ job ใด job หนึ่งแล้วอัปเดต Firebase
        window.calculateAndUpdate = async function(jobId) {
            const aInput = document.getElementById(`a_${jobId}`);
            const bInput = document.getElementById(`b_${jobId}`);
            if (!aInput || !bInput) return;
            const aVal = parseFloat(aInput.value) || 0;
            const bVal = parseFloat(bInput.value) || 0;
            const baseX = parseFloat(document.getElementById('baseValue').value) || 90;
            const result = bVal - baseX;
            
            // อัปเดตใน Firebase
            await jobsRef.child(jobId).update({
                a: aVal,
                b: bVal,
                updatedAt: firebase.database.ServerValue.TIMESTAMP,
                lastResult: result
            });
            await addSystemLog(`🧮 คำนวณงาน ID:${jobId.slice(-6)} | A=${aVal} B=${bVal} → ผลลัพธ์=${result.toFixed(2)}`, jobId);
            showToast('success', 'คำนวณและบันทึกสำเร็จ', 1200);
        };

        // ลบงาน
        window.deleteJobById = async function(jobId) {
            const result = await Swal.fire({
                title: 'ยืนยันการลบ',
                text: 'ลบงานนี้และข้อมูลทั้งหมด?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#cf5a5a',
                confirmButtonText: 'ลบเลย',
                cancelButtonText: 'ยกเลิก'
            });
            if (result.isConfirmed) {
                await jobsRef.child(jobId).remove();
                await addSystemLog(`🗑️ ลบงาน ID:${jobId.slice(-6)}`, jobId);
                showToast('success', 'ลบงานเรียบร้อย', 1200);
            }
        };

        // เพิ่มงานใหม่
        window.addNewJob = async function() {
            const newJobRef = jobsRef.push();
            const newJob = {
                a: 0,
                b: 0,
                lastResult: 0,
                createdAt: firebase.database.ServerValue.TIMESTAMP,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            };
            await newJobRef.set(newJob);
            await addSystemLog(`✨ สร้างงานใหม่ ID:${newJobRef.key.slice(-6)}`, newJobRef.key);
            showToast('success', 'เพิ่มงานใหม่แล้ว', 1000);
        };

        // ล้าง logs ทั้งหมด
        document.getElementById('clearLogsBtn')?.addEventListener('click', async () => {
            const confirm = await Swal.fire({ title: 'ล้างประวัติทั้งหมด?', text: 'Logs จะถูกลบจาก Firebase', icon: 'warning', showCancelButton: true });
            if (confirm.isConfirmed) {
                await logsRef.remove();
                showToast('info', 'ล้าง logs เรียบร้อย');
            }
        });

        // เรนเดอร์ logs จาก Firebase
        function renderLogs() {
            const container = document.getElementById('logContainer');
            const badge = document.getElementById('logCountBadge');
            if (!container) return;
            if (!currentLogs.length) {
                container.innerHTML = `<div class="text-center text-muted small py-3">ยังไม่มีบันทึกการทำงาน</div>`;
                if(badge) badge.innerText = '0';
                return;
            }
            if(badge) badge.innerText = currentLogs.length;
            const logsHtml = currentLogs.map(log => `
                <div class="log-item">
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                        <span class="log-time"><i class="bi bi-clock me-1"></i>${log.readableTime || new Date(log.timestamp).toLocaleString('th-TH')}</span>
                    </div>
                    <div class="log-message mt-1">${escapeHtml(log.message)}</div>
                </div>
            `).join('');
            container.innerHTML = logsHtml;
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // ---- Firebase Real-time listeners ----
        function initFirebaseListeners() {
            // ฟังการเปลี่ยนแปลงของ jobs
            jobsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const jobsArray = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        jobsArray.push({
                            id: key,
                            a: data[key].a || 0,
                            b: data[key].b || 0,
                            lastResult: data[key].lastResult || 0,
                            createdAt: data[key].createdAt,
                            updatedAt: data[key].updatedAt
                        });
                    });
                }
                // เรียงตาม createdAt (เก่าสุดบน?)
                jobsArray.sort((x,y) => (x.createdAt || 0) - (y.createdAt || 0));
                currentJobs = jobsArray;
                renderJobs();
                // ซ่อน splash screen เมื่อโหลด jobs ครั้งแรก
                const splash = document.getElementById('splashScreen');
                if(splash && splash.classList) splash.classList.add('hide');
                setTimeout(() => { if(splash) splash.style.display = 'none'; }, 500);
            });

            // ฟัง logs แบบเรียลไทม์
            logsRef.orderByChild('timestamp').limitToLast(100).on('value', (snapshot) => {
                const logsArr = [];
                if(snapshot.val()) {
                    Object.values(snapshot.val()).forEach(log => {
                        logsArr.push(log);
                    });
                }
                logsArr.reverse(); // ใหม่ล่าสุดอยู่บน
                currentLogs = logsArr;
                renderLogs();
            });
        }

        // เมื่อค่า X เปลี่ยนแปลง ให้ rerender เพื่อให้ผลลัพธ์แสดงตาม X ใหม่ (โดยไม่ต้องคำนวณใหม่ทันที แต่ UI จะ update)
        document.getElementById('baseValue')?.addEventListener('input', () => {
            renderJobs();  // แค่แสดงผลลัพธ์ตามค่า X ใหม่ (ไม่บันทึกค่าลง job จนกว่าจะกดคำนวณ)
            // บันทึก log การเปลี่ยน X (ทางเลือก)
            const newX = document.getElementById('baseValue').value;
            addSystemLog(`📏 เปลี่ยนค่าตัวลบพาเลทเป็น ${newX}`);
        });

        // Scroll progress
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progressBar').style.width = scrolled + "%";
        });

        // ปีปัจจุบัน
        document.getElementById('currentYear').innerText = new Date().getFullYear();

        // เริ่มต้นระบบ และซ่อน splash เมื่อเชื่อมต่อสำเร็จ
        window.addEventListener('load', () => {
            AOS.init({ duration: 600, once: true });
            initFirebaseListeners();
        });

        // เตือนถ้า Firebase config ยังไม่ถูกต้อง
        if(firebaseConfig.apiKey === "YOUR_API_KEY") {
            setTimeout(() => {
                Swal.fire({ icon: 'warning', title: '⚠️ ยังไม่ได้ตั้งค่า Firebase', text: 'กรุณาแก้ไข firebaseConfig ในโค้ดให้เป็นค่าจริงจาก Firebase Console', confirmButtonText: 'ตกลง' });
            }, 1000);
        }
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // PWA service worker (optional) - รับจาก original
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log("SW error:", err));
        }
    </script>
</body>
